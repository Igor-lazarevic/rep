<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Divan dan... 🎂</title>
    <link rel="icon" href="https://fav.farm/🎂" />
    <style>
        :root {
            --bg-color: #0a0e17; 
            --cake-main: #f39c12; 
            --cake-icing: #ffffff; 
            --candle-body: #e74c3c;
            --candle-fire: #ffeb3b;
            --text-color: #ecf0f1;
        }

        body {
            background-color: var(--bg-color);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Poppins', sans-serif;
            color: var(--text-color);
            overflow: hidden;
            touch-action: manipulation;
        }

        .stage {
            width: 95%;
            max-width: 800px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }

        /* --- TORTA --- */
        .cake-container {
            position: relative;
            width: 300px;
            height: 250px;
            margin-bottom: 20px;
            display: flex;
            justify-content: center;
        }

        .cake-layer {
            position: absolute;
            left: 50%;
            transform: translateX(-50%) scale(0);
            border-radius: 15px 15px 8px 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
            animation: layerPopIn 0.7s cubic-bezier(0.17, 0.67, 0.83, 0.67) forwards;
        }

        .cake-layer::after {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 25px;
            background: var(--cake-icing);
            border-radius: 15px 15px 0 0;
            opacity: 0.9;
        }

        .layer-bottom { bottom: 0; width: 280px; height: 100px; background: #d35400; z-index: 1; }
        .layer-middle { bottom: 65px; width: 210px; height: 90px; background: #e67e22; animation-delay: 0.5s; z-index: 2; }
        .layer-top { bottom: 120px; width: 140px; height: 80px; background: #f39c12; animation-delay: 1s; z-index: 3; }

        .candle-container {
            position: absolute;
            bottom: 185px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 4;
            opacity: 0;
            transition: opacity 0.5s ease-in 1.5s;
        }

        .candle-body {
            width: 14px;
            height: 55px;
            background: repeating-linear-gradient(45deg, #e74c3c, #e74c3c 6px, #fff 6px, #fff 12px);
            border-radius: 4px;
        }

        /* --- TEXT BOX PORAVNANJE --- */
        .message-box {
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.8s ease-out;
            padding: 10px 20px;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .message-box.show { opacity: 1; transform: translateY(0); }

        h1 {
            font-size: 2.8rem;
            margin: 10px 0;
            background: linear-gradient(to right, #f1c40f, #f39c12);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 700;
        }

        .main-p {
            font-size: 1.15rem;
            line-height: 1.6;
            margin: 0;
            color: #ecf0f1;
        }

        .sub-p {
            font-size: 0.95rem;
            line-height: 1.5;
            font-style: italic;
            opacity: 0.8;
            margin-top: 5px;
            color: #bdc3c7;
        }

        /* --- RESPONSIVE OPTIMIZACIJA --- */
        @media (max-width: 600px) {
            .cake-container { width: 200px; height: 180px; }
            .layer-bottom { width: 180px; height: 70px; }
            .layer-middle { width: 140px; height: 60px; bottom: 45px; }
            .layer-top { width: 90px; height: 55px; bottom: 85px; }
            .candle-container { bottom: 130px; }
            .candle-body { width: 10px; height: 40px; }
            h1 { font-size: 1.9rem; }
            .main-p { font-size: 1rem; }
            .sub-p { font-size: 0.85rem; }
            .action-btn { width: 85%; }
        }

        @keyframes layerPopIn {
            to { transform: translateX(-50%) scale(1); opacity: 1; }
        }

        .flame {
            position: absolute;
            top: -25px;
            left: 50%;
            transform: translateX(-50%);
            width: 18px; height: 28px;
            background: radial-gradient(circle, #fff, #ffeb3b, orange, transparent);
            border-radius: 50% 50% 30% 30%;
            box-shadow: 0 0 25px 8px rgba(255, 165, 0, 0.6);
            animation: flicker 0.15s infinite alternate;
            display: none;
        }

        @keyframes flicker {
            from { transform: translateX(-50%) scale(1); opacity: 0.8; }
            to { transform: translateX(-50%) scale(1.1); opacity: 1; }
        }

        .action-btn {
            background: linear-gradient(135deg, #e74c3c, #c0392b);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            margin-top: 15px;
            box-shadow: 0 8px 20px rgba(192, 57, 43, 0.4);
            transition: transform 0.2s;
            -webkit-tap-highlight-color: transparent;
        }

        .action-btn:active { transform: scale(0.95); }
        .action-btn:disabled { background: #27ae60; cursor: default; transform: none; box-shadow: none; }

        .particle { position: absolute; border-radius: 50%; pointer-events: none; }
    </style>
</head>
<body>

    <div class="stage">
        <div class="cake-container">
            <div class="cake-layer layer-bottom"></div>
            <div class="cake-layer layer-middle"></div>
            <div class="cake-layer layer-top"></div>
            <div class="candle-container" id="candleGroup">
                <div class="flame" id="flame"></div>
                <div class="candle-body"></div>
            </div>
        </div>

        <div class="message-box" id="messageBox">
            <h1>Srećan rođendan! ✨</h1>
            <p class="main-p">Neka ti ova godina bude bez bagova i uvek u <i>runtime</i> sreći.</p>
            <p class="sub-p">
                Neka ti rođendan donese onoliko lepih trenutaka koliko ti neprimetno unosiš lepote gde god se pojaviš.
            </p>
        </div>

        <button class="action-btn" id="activateBtn">Upali svećicu i zamisli želju</button>
    </div>

    <script>
        const btn = document.getElementById('activateBtn');
        const flame = document.getElementById('flame');
        const candleGroup = document.getElementById('candleGroup');
        const messageBox = document.getElementById('messageBox');

        window.onload = () => {
            setTimeout(() => { candleGroup.style.opacity = '1'; }, 1600);
        };

        btn.addEventListener('click', () => {
            flame.style.display = 'block';
            messageBox.classList.add('show');
            btn.innerHTML = "Uživaj u svom danu! ✨";
            btn.disabled = true;

            for(let i = 0; i < 8; i++) {
                setTimeout(() => {
                    const x = Math.random() * window.innerWidth;
                    const y = Math.random() * (window.innerHeight * 0.4);
                    createExplosion(x, y);
                }, i * 350);
            }
        });

        function createExplosion(x, y) {
            const isMobile = window.innerWidth < 600;
            const count = isMobile ? 35 : 60;
            const hue = Math.random() * 360;
            
            for (let i = 0; i < count; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                const size = Math.random() * (isMobile ? 4 : 6) + 2;
                const color = `hsl(${hue}, 100%, 70%)`;
                
                p.style.width = size + 'px';
                p.style.height = size + 'px';
                p.style.backgroundColor = color;
                p.style.boxShadow = `0 0 12px 3px ${color}`;
                p.style.left = x + 'px';
                p.style.top = y + 'px';

                document.body.appendChild(p);

                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * (isMobile ? 12 : 18) + 4;
                const destX = Math.cos(angle) * speed * 20;
                const destY = Math.sin(angle) * speed * 20 + 40;

                p.animate([
                    { transform: 'translate(0, 0) scale(1)', opacity: 1 },
                    { transform: `translate(${destX}px, ${destY}px) scale(0)`, opacity: 0 }
                ], {
                    duration: 1500 + Math.random() * 1000,
                    easing: 'cubic-bezier(0, .9, .5, 1)'
                }).onfinish = () => p.remove();
            }
        }
    </script>
</body>
</html>
